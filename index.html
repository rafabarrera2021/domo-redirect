<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DOMO UdeA</title>
  <style>
    body { font-family: sans-serif; text-align: center; padding: 40px 20px; background: #f4f9f8; color: #333; }
    .card { background: white; max-width: 400px; margin: auto; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    h2 { color: #028090; }
    .btn { display: block; width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 8px; font-weight: bold; color: white; cursor: pointer; font-size: 16px; }
    .btn-reuso { background: #028090; }
    .btn-reciclaje { background: #e63946; }
    #loading, #acciones, #mensaje { display: none; }
  </style>
</head>
<body>

  <div class="card">
    <h2>Sistema DOMO</h2>
    
    <!-- Pantalla de Carga -->
    <div id="loading" style="display: block;">
      <p>Conectando con el sistema...</p>
      <p style="font-size: 24px;">⏳</p>
    </div>

    <!-- Pantalla del Asistente (Botones) -->
    <div id="acciones">
      <p>Vaso detectado: <strong id="display-vaso"></strong></p>
      <p>Grupo: <strong id="display-grupo"></strong></p>
      <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">
      <button class="btn btn-reuso" onclick="registrarAccion('reuso')">♻️ REGISTRAR REUSO</button>
      <button class="btn btn-reciclaje" onclick="registrarAccion('reciclaje')">🗑️ REGISTRAR RECICLAJE</button>
    </div>

    <!-- Pantalla de Éxito -->
    <div id="mensaje">
      <p style="font-size: 40px; margin: 0;">✅</p>
      <p id="texto-mensaje" style="font-weight: bold; margin-top: 10px;"></p>
    </div>
  </div>

  <script>
    // --- 1. PEGA TU URL DE GOOGLE SCRIPT AQUÍ ---
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzfrowrbdUzcuwb54oTAGLEk-A_K7vIVV1xKPG-rsRYDX39N81hIJY0q4qF9VLsnrwUQg/exec";

    // --- 2. CAPTURAR PARÁMETROS DE LA URL ---
    const urlParams = new URLSearchParams(window.location.search);
    const vasoId = urlParams.get('vaso_id');
    const punto = urlParams.get('punto') || "P1";

    const divLoading = document.getElementById('loading');
    const divAcciones = document.getElementById('acciones');
    const divMensaje = document.getElementById('mensaje');

    // --- 3. INICIAR COMUNICACIÓN CON LA BASE DE DATOS ---
    window.onload = function() {
      if (!vasoId) {
        mostrarMensaje("Error: No se detectó un ID de vaso válido en el código QR.");
        return;
      }

      // Enviar solicitud a Google Script
      fetch(`${SCRIPT_URL}?vaso_id=${vasoId}&punto=${punto}`)
        .then(response => response.json())
        .then(data => {
          
          if (data.error) {
            mostrarMensaje("Error del servidor: " + data.error);
          } 
          // Si el vaso es NUEVO, redirigir automáticamente al Formulario
          else if (data.tipo === "nuevo") {
            divLoading.innerHTML = "<p>Redirigiendo a la encuesta...</p>";
            window.location.href = data.redirectUrl;
          } 
          // Si el vaso EXISTE, mostrar botones para el asistente
          else if (data.tipo === "existente") {
            divLoading.style.display = 'none';
            divAcciones.style.display = 'block';
            document.getElementById('display-vaso').innerText = data.vasoId;
            document.getElementById('display-grupo').innerText = data.grupo;
          }
        })
        .catch(error => {
          mostrarMensaje("Error de conexión. Intenta nuevamente.");
          console.error(error);
        });
    };

    // --- 4. FUNCIÓN PARA LOS BOTONES DE REUSO/RECICLAJE ---
    function registrarAccion(accion) {
      divAcciones.style.display = 'none';
      divLoading.style.display = 'block';
      divLoading.innerHTML = "<p>Guardando registro...</p>";

      fetch(`${SCRIPT_URL}?vaso_id=${vasoId}&punto=${punto}&accion=${accion}`)
        .then(response => response.json())
        .then(data => {
          if(data.success) {
            mostrarMensaje(`Acción (${accion.toUpperCase()}) guardada correctamente en el sistema.`);
          }
        })
        .catch(error => mostrarMensaje("Hubo un error al guardar."));
    }

    function mostrarMensaje(texto) {
      divLoading.style.display = 'none';
      divAcciones.style.display = 'none';
      divMensaje.style.display = 'block';
      document.getElementById('texto-mensaje').innerText = texto;
    }
  </script>

</body>
</html>
